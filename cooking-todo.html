<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cooking To-Do</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sage: { 50: '#f6f7f4', 100: '#e8ebe3', 500: '#6b7f5e', 600: '#556648', 700: '#445239' },
            terracotta: { 400: '#e07a5f', 500: '#d4654a', 600: '#c2553d' },
            cream: { 50: '#fdfbf7', 100: '#f9f5ee' },
          },
          fontFamily: {
            display: ['"Fraunces"', 'Georgia', 'serif'],
            sans: ['"DM Sans"', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-cream-50 min-h-screen font-sans text-sage-700 antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback } = React;

    const DIETARY_OPTIONS = ['veg', 'non-veg', 'vegan', 'eggetarian'];
    const ENERGY_OPTIONS = [
      { value: 'quick & easy', label: 'Quick & Easy', desc: 'Under 30 min per meal' },
      { value: 'moderate', label: 'Moderate', desc: '30–60 min per meal' },
      { value: 'elaborate', label: 'Elaborate', desc: 'Full cooking experience' },
    ];

    const CATEGORY_LABELS = {
      produce: 'Produce',
      dairy: 'Dairy',
      pantry: 'Pantry',
      protein: 'Protein',
      spices: 'Spices & Seasonings',
      frozen: 'Frozen',
      bakery: 'Bakery',
      beverages: 'Beverages',
      other: 'Other',
    };

    function buildPrompt(form) {
      return `You are a helpful Indian home-cooking assistant. Generate a personalized one-day cooking plan.

User details:
- People to cook for: ${form.people}
- Dietary preference: ${form.diet}
- Daily budget: ₹${form.budget}
- Cuisine preference: ${form.cuisine || 'any Indian/regional cuisine'}
- Energy/time level: ${form.energy}
- Allergies or ingredients to avoid: ${form.allergies || 'none'}

Respond with ONLY valid JSON (no markdown, no code fences, no preamble or explanation) matching this exact schema:
{
  "mealPlan": {
    "breakfast": { "name": "string", "description": "string (one line)" },
    "lunch": { "name": "string", "description": "string (one line)" },
    "dinner": { "name": "string", "description": "string (one line)" }
  },
  "groceryList": [
    {
      "category": "produce|dairy|pantry|protein|spices|frozen|bakery|beverages|other",
      "items": [{ "name": "string", "quantity": "string" }]
    }
  ],
  "substitutions": [
    { "ingredient": "string", "substitute": "string", "reason": "string" }
  ],
  "budgetFeasibility": {
    "estimatedTotalCost": number,
    "fitsBudget": boolean,
    "note": "string (include cheaper swap suggestions if over budget)"
  }
}

Use realistic Indian grocery prices in ₹ for ${form.people} people. Respect dietary restrictions strictly. If over budget, set fitsBudget to false and suggest cheaper swaps in the note and substitutions.`;
    }

    function parseAIResponse(text) {
      let cleaned = text.trim();
      cleaned = cleaned.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/i, '').trim();
      const jsonStart = cleaned.indexOf('{');
      const jsonEnd = cleaned.lastIndexOf('}');
      if (jsonStart !== -1 && jsonEnd !== -1) {
        cleaned = cleaned.slice(jsonStart, jsonEnd + 1);
      }
      return JSON.parse(cleaned);
    }

    function validateResult(data) {
      if (!data?.mealPlan?.breakfast || !data?.mealPlan?.lunch || !data?.mealPlan?.dinner) {
        throw new Error('Invalid response: missing mealPlan');
      }
      if (!Array.isArray(data.groceryList)) throw new Error('Invalid response: missing groceryList');
      if (!Array.isArray(data.substitutions)) throw new Error('Invalid response: missing substitutions');
      if (!data.budgetFeasibility || typeof data.budgetFeasibility.fitsBudget !== 'boolean') {
        throw new Error('Invalid response: missing budgetFeasibility');
      }
      return data;
    }

    async function fetchMealPlan(form, apiKey) {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 4096,
          messages: [{ role: 'user', content: buildPrompt(form) }],
        }),
      });

      if (!response.ok) {
        const errBody = await response.text();
        throw new Error(`API error (${response.status}): ${errBody.slice(0, 200)}`);
      }

      const payload = await response.json();
      const text = payload.content?.find((b) => b.type === 'text')?.text;
      if (!text) throw new Error('No text content in API response');

      return validateResult(parseAIResponse(text));
    }

    function MealIcon({ meal }) {
      const icons = { breakfast: '🌅', lunch: '☀️', dinner: '🌙' };
      return <span className="text-2xl" aria-hidden="true">{icons[meal]}</span>;
    }

    function LoadingSpinner() {
      return (
        <div className="flex flex-col items-center justify-center py-20 gap-4">
          <div className="relative w-14 h-14">
            <div className="absolute inset-0 rounded-full border-4 border-sage-100" />
            <div className="absolute inset-0 rounded-full border-4 border-transparent border-t-terracotta-500 animate-spin" />
          </div>
          <p className="text-sage-600 font-medium">Planning your meals…</p>
          <p className="text-sm text-sage-500">Claude is crafting your personalized list</p>
        </div>
      );
    }

    function GroceryCheckbox({ checked, onChange, label, quantity }) {
      return (
        <label className="flex items-start gap-3 py-2 px-3 rounded-lg hover:bg-cream-100 cursor-pointer group transition-colors">
          <input
            type="checkbox"
            checked={checked}
            onChange={onChange}
            className="mt-1 w-4 h-4 rounded border-sage-300 text-terracotta-500 focus:ring-terracotta-400 focus:ring-offset-0 cursor-pointer"
          />
          <span className={`flex-1 ${checked ? 'line-through text-sage-400' : 'text-sage-700'}`}>
            {label}
            {quantity && (
              <span className={`ml-2 text-sm ${checked ? 'text-sage-300' : 'text-sage-500'}`}>
                ({quantity})
              </span>
            )}
          </span>
        </label>
      );
    }

    function App() {
      const [form, setForm] = useState({
        people: 2,
        diet: 'veg',
        budget: 500,
        cuisine: '',
        energy: 'moderate',
        allergies: '',
      });
      const [apiKey, setApiKey] = useState(() => sessionStorage.getItem('anthropic_api_key') || '');
      const [result, setResult] = useState(null);
      const [checkedItems, setCheckedItems] = useState({});
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);

      const update = (field, value) => setForm((f) => ({ ...f, [field]: value }));

      const handleApiKeyChange = (value) => {
        setApiKey(value);
        if (value) sessionStorage.setItem('anthropic_api_key', value);
        else sessionStorage.removeItem('anthropic_api_key');
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!apiKey.trim()) {
          setError('Please enter your Anthropic API key.');
          return;
        }
        setLoading(true);
        setError(null);
        setResult(null);
        setCheckedItems({});

        try {
          const data = await fetchMealPlan(form, apiKey.trim());
          setResult(data);
        } catch (err) {
          setError(err.message || 'Something went wrong. Please try again.');
        } finally {
          setLoading(false);
        }
      };

      const toggleItem = useCallback((key) => {
        setCheckedItems((prev) => ({ ...prev, [key]: !prev[key] }));
      }, []);

      const totalGroceryItems = result
        ? result.groceryList.reduce((sum, g) => sum + (g.items?.length || 0), 0)
        : 0;
      const checkedCount = Object.values(checkedItems).filter(Boolean).length;

      return (
        <div className="max-w-3xl mx-auto px-4 py-8 sm:py-12">
          {/* Header */}
          <header className="text-center mb-10">
            <div className="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-terracotta-500/10 mb-4">
              <span className="text-3xl" aria-hidden="true">🍳</span>
            </div>
            <h1 className="font-display text-4xl sm:text-5xl font-bold text-sage-700 tracking-tight">
              Cooking To-Do
            </h1>
            <p className="mt-3 text-sage-500 text-lg max-w-md mx-auto">
              Your personalized meal plan, grocery list, and budget check — tailored to your day.
            </p>
          </header>

          {/* Form */}
          <form
            onSubmit={handleSubmit}
            className="bg-white rounded-2xl shadow-sm border border-sage-100 p-6 sm:p-8 mb-8"
          >
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
              <div className="sm:col-span-2">
                <label htmlFor="apiKey" className="block text-sm font-semibold text-sage-700 mb-1.5">
                  Anthropic API key
                </label>
                <input
                  id="apiKey"
                  type="password"
                  required
                  placeholder="sk-ant-api03-..."
                  value={apiKey}
                  onChange={(e) => handleApiKeyChange(e.target.value)}
                  className="w-full px-4 py-2.5 rounded-xl border border-sage-200 bg-cream-50 focus:outline-none focus:ring-2 focus:ring-terracotta-400 focus:border-transparent transition placeholder:text-sage-300"
                />
                <p className="mt-1.5 text-xs text-sage-400">Stored in this browser session only — never sent anywhere except Anthropic.</p>
              </div>

              <div>
                <label htmlFor="people" className="block text-sm font-semibold text-sage-700 mb-1.5">
                  People to cook for
                </label>
                <input
                  id="people"
                  type="number"
                  min="1"
                  max="20"
                  required
                  value={form.people}
                  onChange={(e) => update('people', Math.max(1, parseInt(e.target.value) || 1))}
                  className="w-full px-4 py-2.5 rounded-xl border border-sage-200 bg-cream-50 focus:outline-none focus:ring-2 focus:ring-terracotta-400 focus:border-transparent transition"
                />
              </div>

              <div>
                <label htmlFor="budget" className="block text-sm font-semibold text-sage-700 mb-1.5">
                  Daily budget (₹)
                </label>
                <input
                  id="budget"
                  type="number"
                  min="50"
                  step="50"
                  required
                  value={form.budget}
                  onChange={(e) => update('budget', Math.max(50, parseInt(e.target.value) || 50))}
                  className="w-full px-4 py-2.5 rounded-xl border border-sage-200 bg-cream-50 focus:outline-none focus:ring-2 focus:ring-terracotta-400 focus:border-transparent transition"
                />
              </div>

              <div>
                <label htmlFor="diet" className="block text-sm font-semibold text-sage-700 mb-1.5">
                  Dietary preference
                </label>
                <select
                  id="diet"
                  value={form.diet}
                  onChange={(e) => update('diet', e.target.value)}
                  className="w-full px-4 py-2.5 rounded-xl border border-sage-200 bg-cream-50 focus:outline-none focus:ring-2 focus:ring-terracotta-400 focus:border-transparent transition capitalize"
                >
                  {DIETARY_OPTIONS.map((d) => (
                    <option key={d} value={d} className="capitalize">{d}</option>
                  ))}
                </select>
              </div>

              <div>
                <label htmlFor="cuisine" className="block text-sm font-semibold text-sage-700 mb-1.5">
                  Cuisine preference <span className="font-normal text-sage-400">(optional)</span>
                </label>
                <input
                  id="cuisine"
                  type="text"
                  placeholder="e.g. South Indian, Punjabi, Indo-Chinese"
                  value={form.cuisine}
                  onChange={(e) => update('cuisine', e.target.value)}
                  className="w-full px-4 py-2.5 rounded-xl border border-sage-200 bg-cream-50 focus:outline-none focus:ring-2 focus:ring-terracotta-400 focus:border-transparent transition placeholder:text-sage-300"
                />
              </div>

              <div className="sm:col-span-2">
                <span className="block text-sm font-semibold text-sage-700 mb-2">
                  Energy / time level
                </span>
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                  {ENERGY_OPTIONS.map((opt) => (
                    <label
                      key={opt.value}
                      className={`relative flex flex-col p-4 rounded-xl border-2 cursor-pointer transition ${
                        form.energy === opt.value
                          ? 'border-terracotta-500 bg-terracotta-500/5'
                          : 'border-sage-100 bg-cream-50 hover:border-sage-200'
                      }`}
                    >
                      <input
                        type="radio"
                        name="energy"
                        value={opt.value}
                        checked={form.energy === opt.value}
                        onChange={(e) => update('energy', e.target.value)}
                        className="sr-only"
                      />
                      <span className="font-semibold text-sage-700 text-sm">{opt.label}</span>
                      <span className="text-xs text-sage-500 mt-0.5">{opt.desc}</span>
                    </label>
                  ))}
                </div>
              </div>

              <div className="sm:col-span-2">
                <label htmlFor="allergies" className="block text-sm font-semibold text-sage-700 mb-1.5">
                  Allergies or ingredients to avoid <span className="font-normal text-sage-400">(optional)</span>
                </label>
                <input
                  id="allergies"
                  type="text"
                  placeholder="e.g. peanuts, gluten, onion"
                  value={form.allergies}
                  onChange={(e) => update('allergies', e.target.value)}
                  className="w-full px-4 py-2.5 rounded-xl border border-sage-200 bg-cream-50 focus:outline-none focus:ring-2 focus:ring-terracotta-400 focus:border-transparent transition placeholder:text-sage-300"
                />
              </div>
            </div>

            <button
              type="submit"
              disabled={loading}
              className="mt-6 w-full sm:w-auto px-8 py-3 bg-terracotta-500 hover:bg-terracotta-600 disabled:bg-terracotta-400 disabled:cursor-not-allowed text-white font-semibold rounded-xl shadow-sm transition focus:outline-none focus:ring-2 focus:ring-terracotta-400 focus:ring-offset-2"
            >
              {loading ? 'Generating…' : 'Generate My Cooking To-Do'}
            </button>
          </form>

          {/* Error */}
          {error && (
            <div className="mb-8 p-4 rounded-xl bg-red-50 border border-red-200 text-red-700 flex gap-3 items-start" role="alert">
              <span className="text-xl shrink-0" aria-hidden="true">⚠️</span>
              <div>
                <p className="font-semibold">Could not generate your plan</p>
                <p className="text-sm mt-1 text-red-600">{error}</p>
              </div>
            </div>
          )}

          {/* Loading */}
          {loading && <LoadingSpinner />}

          {/* Results */}
          {result && !loading && (
            <div className="space-y-6 animate-[fadeIn_0.4s_ease-out]">
              {/* Meal Plan */}
              <section className="bg-white rounded-2xl shadow-sm border border-sage-100 overflow-hidden">
                <div className="px-6 py-4 border-b border-sage-100 bg-sage-50/50">
                  <h2 className="font-display text-xl font-bold text-sage-700">Meal Plan</h2>
                </div>
                <div className="p-6 grid gap-4">
                  {['breakfast', 'lunch', 'dinner'].map((meal) => (
                    <div
                      key={meal}
                      className="flex gap-4 p-4 rounded-xl bg-cream-50 border border-sage-100"
                    >
                      <MealIcon meal={meal} />
                      <div>
                        <p className="text-xs font-semibold uppercase tracking-wider text-sage-500 mb-0.5">
                          {meal}
                        </p>
                        <h3 className="font-semibold text-sage-700 text-lg">
                          {result.mealPlan[meal].name}
                        </h3>
                        <p className="text-sage-500 text-sm mt-1">{result.mealPlan[meal].description}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </section>

              {/* Grocery List */}
              <section className="bg-white rounded-2xl shadow-sm border border-sage-100 overflow-hidden">
                <div className="px-6 py-4 border-b border-sage-100 bg-sage-50/50 flex items-center justify-between">
                  <h2 className="font-display text-xl font-bold text-sage-700">Grocery List</h2>
                  {totalGroceryItems > 0 && (
                    <span className="text-sm text-sage-500">
                      {checkedCount}/{totalGroceryItems} checked
                    </span>
                  )}
                </div>
                <div className="p-6 space-y-6">
                  {result.groceryList.map((group, gi) => (
                    <div key={gi}>
                      <h3 className="text-sm font-bold uppercase tracking-wider text-terracotta-500 mb-2">
                        {CATEGORY_LABELS[group.category?.toLowerCase()] || group.category}
                      </h3>
                      <div className="divide-y divide-sage-50">
                        {(group.items || []).map((item, ii) => {
                          const key = `${gi}-${ii}`;
                          return (
                            <GroceryCheckbox
                              key={key}
                              checked={!!checkedItems[key]}
                              onChange={() => toggleItem(key)}
                              label={item.name}
                              quantity={item.quantity}
                            />
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>
              </section>

              {/* Substitutions */}
              {result.substitutions.length > 0 && (
                <section className="bg-white rounded-2xl shadow-sm border border-sage-100 overflow-hidden">
                  <div className="px-6 py-4 border-b border-sage-100 bg-sage-50/50">
                    <h2 className="font-display text-xl font-bold text-sage-700">Substitutions</h2>
                  </div>
                  <div className="p-6 space-y-3">
                    {result.substitutions.map((sub, i) => (
                      <div
                        key={i}
                        className="p-4 rounded-xl bg-cream-50 border border-sage-100 flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4"
                      >
                        <div className="flex items-center gap-2 shrink-0">
                          <span className="font-medium text-sage-700">{sub.ingredient}</span>
                          <span className="text-sage-400">→</span>
                          <span className="font-semibold text-terracotta-600">{sub.substitute}</span>
                        </div>
                        <p className="text-sm text-sage-500 sm:ml-auto">{sub.reason}</p>
                      </div>
                    ))}
                  </div>
                </section>
              )}

              {/* Budget Feasibility */}
              <section className="bg-white rounded-2xl shadow-sm border border-sage-100 overflow-hidden">
                <div className="px-6 py-4 border-b border-sage-100 bg-sage-50/50">
                  <h2 className="font-display text-xl font-bold text-sage-700">Budget Feasibility</h2>
                </div>
                <div className="p-6">
                  <div className="flex flex-wrap items-center gap-4 mb-4">
                    <div className="flex items-baseline gap-1">
                      <span className="text-3xl font-display font-bold text-sage-700">
                        ₹{result.budgetFeasibility.estimatedTotalCost?.toLocaleString('en-IN')}
                      </span>
                      <span className="text-sage-500 text-sm">estimated total</span>
                    </div>
                    <span
                      className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-sm font-semibold ${
                        result.budgetFeasibility.fitsBudget
                          ? 'bg-green-100 text-green-700'
                          : 'bg-amber-100 text-amber-700'
                      }`}
                    >
                      {result.budgetFeasibility.fitsBudget ? '✓ Within budget' : '⚠ Over budget'}
                    </span>
                    <span className="text-sm text-sage-500">
                      Your budget: ₹{form.budget.toLocaleString('en-IN')}
                    </span>
                  </div>
                  <p className="text-sage-600 leading-relaxed">{result.budgetFeasibility.note}</p>
                </div>
              </section>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</body>
</html>
